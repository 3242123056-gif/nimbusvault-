<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NimbusVault — Cloud File Storage</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0f14; --bg2:#161921; --bg3:#1e2330;
      --border:#2a3045; --border2:#38425c;
      --amber:#f5a623; --amber2:#ffcb6b; --amber-dim:rgba(245,166,35,0.12);
      --text:#e8ecf4; --muted:#7a8499; --danger:#e05050; --success:#4caf80;
      --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
      --radius:6px; --radius2:10px;
    }
    body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; }

    /* AUTH */
    #auth-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;
      background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(245,166,35,.06) 0%,transparent 70%),var(--bg); }
    .auth-box { width:100%; max-width:420px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius2); padding:2.5rem; }
    .brand { display:flex; align-items:center; gap:10px; margin-bottom:2rem; }
    .brand-icon { width:36px; height:36px; background:var(--amber); border-radius:8px; display:flex; align-items:center; justify-content:center; }
    .brand-icon svg { width:20px; height:20px; fill:#0d0f14; }
    .brand-name { font-family:var(--mono); font-size:18px; font-weight:700; }
    .brand-name span { color:var(--amber); }
    .auth-tabs { display:flex; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:1.75rem; }
    .auth-tab { flex:1; padding:.6rem; background:transparent; border:none; color:var(--muted); font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer; transition:all .2s; }
    .auth-tab.active { background:var(--amber-dim); color:var(--amber); }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:12px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .form-group input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:.65rem .9rem; color:var(--text); font-family:var(--sans); font-size:15px; outline:none; transition:border-color .2s; }
    .form-group input:focus { border-color:var(--amber); }
    .btn-primary { width:100%; padding:.75rem; background:var(--amber); color:#0d0f14; border:none; border-radius:var(--radius); font-family:var(--sans); font-size:15px; font-weight:600; cursor:pointer; transition:opacity .2s,transform .1s; margin-top:.5rem; }
    .btn-primary:hover { opacity:.88; }
    .btn-primary:active { transform:scale(.98); }
    .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
    .auth-error { background:rgba(224,80,80,.12); border:1px solid rgba(224,80,80,.3); border-radius:var(--radius); color:#f08080; padding:.65rem .9rem; font-size:13px; margin-top:.75rem; display:none; }
    .auth-info { background:rgba(245,166,35,.1); border:1px solid rgba(245,166,35,.3); border-radius:var(--radius); color:var(--amber2); padding:.65rem .9rem; font-size:13px; margin-top:.75rem; display:none; }

    /* APP */
    #app-screen { display:none; min-height:100vh; flex-direction:column; }
    #app-screen.visible { display:flex; }
    .topbar { height:56px; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 1.5rem; position:sticky; top:0; z-index:10; }
    .topbar-brand { font-family:var(--mono); font-size:15px; font-weight:700; }
    .topbar-brand span { color:var(--amber); }
    .topbar-sep { width:1px; height:20px; background:var(--border); margin:0 12px; }
    .user-badge { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); }
    .user-avatar { width:26px; height:26px; border-radius:50%; background:var(--amber-dim); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--amber); }
    .btn-ghost { background:transparent; border:1px solid var(--border); border-radius:var(--radius); color:var(--muted); padding:.4rem .85rem; font-family:var(--sans); font-size:13px; cursor:pointer; transition:all .2s; }
    .btn-ghost:hover { border-color:var(--border2); color:var(--text); }
    .main { flex:1; padding:2rem 1.5rem; max-width:900px; width:100%; margin:0 auto; }

    /* STATS */
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:2rem; }
    .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius2); padding:1rem 1.25rem; }
    .stat-label { font-family:var(--mono); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
    .stat-value { font-size:22px; font-weight:600; }
    .stat-value.amber { color:var(--amber); }

    /* UPLOAD */
    .section-title { font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:.75rem; }
    .upload-zone { border:1.5px dashed var(--border2); border-radius:var(--radius2); background:var(--bg2); padding:2.5rem; text-align:center; cursor:pointer; transition:all .2s; margin-bottom:2rem; position:relative; }
    .upload-zone:hover,.upload-zone.drag-over { border-color:var(--amber); background:var(--amber-dim); }
    .upload-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-icon { width:44px; height:44px; background:var(--bg3); border-radius:10px; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; }
    .upload-icon svg { width:22px; height:22px; stroke:var(--amber); fill:none; stroke-width:1.8; }
    .upload-title { font-size:15px; font-weight:500; margin-bottom:4px; }
    .upload-hint { font-size:13px; color:var(--muted); }

    /* PROGRESS */
    .progress-wrap { margin-bottom:1.5rem; display:none; }
    .progress-info { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:6px; }
    .progress-bar-bg { background:var(--bg3); border-radius:100px; height:6px; overflow:hidden; }
    .progress-bar-fill { height:100%; background:var(--amber); border-radius:100px; width:0%; transition:width .3s; }

    /* FILE LIST */
    .file-list-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; }
    .file-count-badge { background:var(--amber-dim); color:var(--amber); border-radius:100px; font-size:11px; font-family:var(--mono); padding:2px 8px; }
    .file-list { display:flex; flex-direction:column; gap:8px; }
    .file-item { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius2); padding:.85rem 1rem; display:flex; align-items:center; gap:12px; transition:border-color .2s; animation:slideIn .25s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .file-item:hover { border-color:var(--border2); }
    .file-icon { width:38px; height:38px; border-radius:8px; background:var(--bg3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .file-icon span { font-family:var(--mono); font-size:9px; font-weight:700; color:var(--amber); text-transform:uppercase; }
    .file-meta { flex:1; min-width:0; }
    .file-name { font-family:var(--mono); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
    .file-info { font-size:11px; color:var(--muted); }
    .file-actions { display:flex; gap:6px; flex-shrink:0; }
    .btn-icon { width:32px; height:32px; border:1px solid var(--border); border-radius:var(--radius); background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; }
    .btn-icon svg { width:15px; height:15px; stroke:var(--muted); fill:none; stroke-width:2; }
    .btn-icon:hover { border-color:var(--amber); }
    .btn-icon:hover svg { stroke:var(--amber); }
    .btn-icon.danger:hover { border-color:var(--danger); }
    .btn-icon.danger:hover svg { stroke:var(--danger); }
    .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); font-size:14px; }

    /* TOAST */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius2); padding:.75rem 1.1rem; font-size:13px; z-index:999; opacity:0; transform:translateY(10px); transition:all .3s; pointer-events:none; max-width:300px; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.success { border-color:rgba(76,175,128,.4); }
    .toast.error { border-color:rgba(224,80,80,.4); }

    /* LOADING */
    #loading-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; }
    .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(13,15,20,.85); display:none; align-items:center; justify-content:center; z-index:50; padding:1rem; }
    .modal-overlay.visible { display:flex; }
    .modal-box { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius2); padding:1.75rem; max-width:380px; width:100%; }
    .modal-title { font-size:16px; font-weight:600; margin-bottom:.5rem; }
    .modal-body { font-size:14px; color:var(--muted); margin-bottom:1.5rem; }
    .modal-file-name { font-family:var(--mono); font-size:13px; color:var(--text); background:var(--bg3); padding:4px 8px; border-radius:4px; }
    .modal-actions { display:flex; gap:8px; }
    .btn-danger { flex:1; padding:.65rem; background:rgba(224,80,80,.15); border:1px solid rgba(224,80,80,.4); border-radius:var(--radius); color:#f08080; font-family:var(--sans); font-size:14px; cursor:pointer; transition:all .2s; }
    .btn-danger:hover { background:rgba(224,80,80,.25); }
    .btn-cancel { flex:1; padding:.65rem; background:transparent; border:1px solid var(--border); border-radius:var(--radius); color:var(--muted); font-family:var(--sans); font-size:14px; cursor:pointer; }
    .btn-cancel:hover { border-color:var(--border2); color:var(--text); }

    @media(max-width:600px){ .stats-row{grid-template-columns:1fr 1fr} .stat-card:last-child{grid-column:1/-1} }
  </style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div></div>

<!-- AUTH -->
<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>
      </div>
      <div class="brand-name">Nimbus<span>Vault</span></div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" /></div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In →</button>
      <div class="auth-error" id="login-error"></div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="Min. 6 characters" /></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="reg-confirm" placeholder="Repeat password" /></div>
      <button class="btn-primary" id="register-btn" onclick="doRegister()">Create Account →</button>
      <div class="auth-error" id="reg-error"></div>
      <div class="auth-info" id="reg-info"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <nav class="topbar">
    <div style="display:flex;align-items:center">
      <div class="topbar-brand">Nimbus<span>Vault</span></div>
      <div class="topbar-sep"></div>
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-email-display">—</span>
      </div>
    </div>
    <button class="btn-ghost" onclick="doLogout()">Sign Out</button>
  </nav>
  <main class="main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Files</div><div class="stat-value amber" id="stat-files">0</div></div>
      <div class="stat-card"><div class="stat-label">Storage Used</div><div class="stat-value" id="stat-size">0 B</div></div>
      <div class="stat-card"><div class="stat-label">Last Upload</div><div class="stat-value" id="stat-last" style="font-size:15px">—</div></div>
    </div>
    <div class="section-title">Upload File</div>
    <div class="upload-zone" id="upload-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)">
      <input type="file" id="file-input" onchange="onFileChange(event)" />
      <div class="upload-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
      <div class="upload-title">Drop files here or click to browse</div>
      <div class="upload-hint">Any file type • Max 50 MB</div>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-info"><span id="progress-name">Uploading…</span><span id="progress-pct">0%</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    </div>
    <div class="file-list-header">
      <div class="section-title" style="margin:0">Your Files</div>
      <div class="file-count-badge" id="file-count-badge">0 files</div>
    </div>
    <div class="file-list" id="file-list"><div class="empty-state">No files yet — upload something to get started.</div></div>
  </main>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal-box">
    <div class="modal-title">Delete File</div>
    <div class="modal-body">Permanently delete <span class="modal-file-name" id="modal-file-name"></span>? This cannot be undone.</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── PASTE YOUR SUPABASE CREDENTIALS HERE ──────────────
  const SUPABASE_URL    = 'https://hqnjujlspifroeazkccv.supabase.co';
  const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhxbmp1amxzcGlmcm9lYXprY2N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODc1NTAsImV4cCI6MjA5NjU2MzU1MH0.NdPUoXCdy2po0guFjhc9tSipxw9hnkAtFw_060KKjB0';
  const BUCKET_NAME     = 'files'; // storage bucket name
  // ──────────────────────────────────────────────────────

  let sbClient, currentUser, userFiles = [], deleteTarget = null;

  async function init() {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    document.getElementById('loading-screen').style.display = 'none';

    const { data: { session } } = await sbClient.auth.getSession();
    if (session) {
      currentUser = session.user;
      showApp();
      loadFiles();
    } else {
      showAuth();
    }

    sbClient.auth.onAuthStateChange((event, session) => {
      if (session) { currentUser = session.user; showApp(); loadFiles(); }
      else { currentUser = null; showAuth(); }
    });
  }

  function showAuth() {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').classList.remove('visible');
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').classList.add('visible');
    const email = currentUser.email || '';
    document.getElementById('user-email-display').textContent = email;
    document.getElementById('user-avatar').textContent = email.charAt(0).toUpperCase();
  }

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('login-form').style.display = isLogin ? '' : 'none';
    document.getElementById('register-form').style.display = isLogin ? 'none' : '';
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showErr('login-error', 'Fill in all fields.'); return; }
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    const { error } = await sbClient.auth.signInWithPassword({ email, password });
    if (error) showErr('login-error', error.message);
    btn.disabled = false; btn.textContent = 'Sign In →';
  }

  async function doRegister() {
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;
    if (!email || !password) { showErr('reg-error', 'Fill in all fields.'); return; }
    if (password !== confirm) { showErr('reg-error', 'Passwords do not match.'); return; }
    if (password.length < 6) { showErr('reg-error', 'Password must be at least 6 characters.'); return; }
    const btn = document.getElementById('register-btn');
    btn.disabled = true; btn.textContent = 'Creating account…';
    const { error } = await sbClient.auth.signUp({ email, password });
    if (error) { showErr('reg-error', error.message); }
    else {
      const info = document.getElementById('reg-info');
      info.textContent = '✅ Account created! Check your email to confirm, then sign in.';
      info.style.display = 'block';
    }
    btn.disabled = false; btn.textContent = 'Create Account →';
  }

  async function doLogout() {
    await sbClient.auth.signOut();
    userFiles = [];
    renderFiles();
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
  }

  // ── UPLOAD ────────────────────────────────────────────
  function onFileChange(e) { const f = e.target.files[0]; if (f) uploadFile(f); e.target.value = ''; }
  function onDragOver(e) { e.preventDefault(); document.getElementById('upload-zone').classList.add('drag-over'); }
  function onDragLeave() { document.getElementById('upload-zone').classList.remove('drag-over'); }
  function onDrop(e) { e.preventDefault(); document.getElementById('upload-zone').classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) uploadFile(f); }

  async function uploadFile(file) {
    if (!currentUser) { showToast('Please sign in first.', 'error'); return; }
    if (file.size > 50 * 1024 * 1024) { showToast('File exceeds 50 MB.', 'error'); return; }

    const pw = document.getElementById('progress-wrap');
    const fill = document.getElementById('progress-fill');
    document.getElementById('progress-name').textContent = file.name;
    document.getElementById('progress-pct').textContent = '0%';
    pw.style.display = 'block';

    // Animate progress (Supabase doesn't have progress events)
    let fakeP = 0;
    const ticker = setInterval(() => {
      fakeP = Math.min(fakeP + 8, 85);
      fill.style.width = fakeP + '%';
      document.getElementById('progress-pct').textContent = fakeP + '%';
    }, 200);

    const filePath = `${currentUser.id}/${Date.now()}_${file.name}`;
    const { error: uploadError } = await sbClient.storage.from(BUCKET_NAME).upload(filePath, file);
    clearInterval(ticker);

    if (uploadError) {
      pw.style.display = 'none'; fill.style.width = '0%';
      showToast('Upload failed: ' + uploadError.message, 'error');
      return;
    }

    fill.style.width = '100%';
    document.getElementById('progress-pct').textContent = '100%';

    const { data: urlData } = sbClient.storage.from(BUCKET_NAME).getPublicUrl(filePath);

    // Save metadata to database
    const { error: dbError } = await sbClient.from('files').insert({
      user_id:    currentUser.id,
      name:       file.name,
      size:       file.size,
      type:       file.type || 'application/octet-stream',
      path:       filePath,
      url:        urlData.publicUrl,
      created_at: new Date().toISOString()
    });

    setTimeout(() => { pw.style.display = 'none'; fill.style.width = '0%'; }, 500);

    if (dbError) { showToast('Metadata save failed: ' + dbError.message, 'error'); return; }

    showToast(`"${file.name}" uploaded!`, 'success');
    loadFiles();
  }

  // ── FILE LIST ─────────────────────────────────────────
  async function loadFiles() {
    if (!currentUser) return;
    const { data, error } = await sbClient
      .from('files')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    if (error) { showToast('Error loading files: ' + error.message, 'error'); return; }
    userFiles = data || [];
    renderFiles();
    updateStats();
  }

  function renderFiles() {
    const list = document.getElementById('file-list');
    const count = userFiles.length;
    document.getElementById('file-count-badge').textContent = count + (count === 1 ? ' file' : ' files');
    if (count === 0) { list.innerHTML = '<div class="empty-state">No files yet — upload something to get started.</div>'; return; }
    list.innerHTML = userFiles.map(f => `
      <div class="file-item">
        <div class="file-icon"><span>${getExt(f.name)}</span></div>
        <div class="file-meta">
          <div class="file-name" title="${esc(f.name)}">${esc(f.name)}</div>
          <div class="file-info">${formatSize(f.size)} · ${formatDate(f.created_at)}</div>
        </div>
        <div class="file-actions">
          <button class="btn-icon" title="Download" onclick="downloadFile('${esc(f.url)}','${esc(f.name)}')">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="btn-icon danger" title="Delete" onclick="openDeleteModal('${f.id}','${esc(f.name)}','${esc(f.path)}')">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>`).join('');
  }

  function updateStats() {
    document.getElementById('stat-files').textContent = userFiles.length;
    const total = userFiles.reduce((s, f) => s + (f.size || 0), 0);
    document.getElementById('stat-size').textContent = formatSize(total);
    if (userFiles.length > 0) {
      const d = new Date(userFiles[0].created_at);
      document.getElementById('stat-last').textContent = d.toLocaleDateString('en-MY', { day:'numeric', month:'short' });
    }
  }

  // ── DELETE ────────────────────────────────────────────
  function openDeleteModal(id, name, path) {
    deleteTarget = { id, path };
    document.getElementById('modal-file-name').textContent = name;
    document.getElementById('delete-modal').classList.add('visible');
  }
  function closeDeleteModal() { deleteTarget = null; document.getElementById('delete-modal').classList.remove('visible'); }

  async function confirmDelete() {
    if (!deleteTarget) return;
    closeDeleteModal();
    await sbClient.storage.from(BUCKET_NAME).remove([deleteTarget.path]);
    await sbClient.from('files').delete().eq('id', deleteTarget.id);
    showToast('File deleted.', 'success');
    loadFiles();
  }

  // ── DOWNLOAD ──────────────────────────────────────────
  function downloadFile(url, name) {
    const a = document.createElement('a');
    a.href = url; a.download = name; a.target = '_blank'; a.rel = 'noopener';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  // ── HELPERS ───────────────────────────────────────────
  function formatSize(b) {
    if (!b) return '0 B';
    const k = 1024, s = ['B','KB','MB','GB'];
    const i = Math.floor(Math.log(b) / Math.log(k));
    return parseFloat((b / Math.pow(k, i)).toFixed(1)) + ' ' + s[i];
  }
  function formatDate(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleDateString('en-MY', { day:'numeric', month:'short', year:'numeric' });
  }
  function getExt(name) { const p = name.split('.'); return p.length > 1 ? p.pop().slice(0,4) : 'file'; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  let toastTimer;
  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginVisible = document.getElementById('login-form').style.display !== 'none';
    if (loginVisible) doLogin(); else doRegister();
  });

  window.addEventListener('load', init);
</script>
</body>
</html>
